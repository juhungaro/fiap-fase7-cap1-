<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield -->
  <rect width="400" height="400" rx="80" fill="#0f172a" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4"/>

  <!-- Glowing background elements -->
  <circle cx="200" cy="200" r="120" fill="url(#heartGrad)" opacity="0.08" filter="url(#glow)"/>

  <!-- Geometric Heart Contour -->
  <path d="M200,320 C200,320 80,240 80,145 C80,90 125,45 185,45 C195,45 200,55 200,55 C200,55 205,45 215,45 C275,45 320,90 320,145 C320,240 200,320 200,320 Z" 
        fill="none" stroke="url(#heartGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Heartbeat/ECG Pulse (Dynamic Visual) -->
  <path d="M 90,170 L 140,170 L 155,130 L 175,260 L 200,90 L 225,200 L 245,155 L 260,175 L 310,175" 
        fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Neural Connection Nodes (representing AI and intelligence) -->
  <g filter="url(#glow)">
    <!-- Connection lines -->
    <line x1="200" y1="90" x2="155" y2="130" stroke="url(#aiGrad)" stroke-width="3" opacity="0.6" />
    <line x1="200" y1="90" x2="245" y2="155" stroke="url(#aiGrad)" stroke-width="3" opacity="0.6" />
    <line x1="175" y1="260" x2="225" y2="200" stroke="url(#aiGrad)" stroke-width="3" opacity="0.6" />
    <line x1="225" y1="200" x2="245" y2="155" stroke="url(#aiGrad)" stroke-width="3" opacity="0.6" />
    
    <!-- Pulse nodes -->
    <circle cx="200" cy="90" r="10" fill="#3b82f6" />
    <circle cx="155" cy="130" r="8" fill="#3b82f6" />
    <circle cx="245" cy="155" r="9" fill="#3b82f6" />
    <circle cx="175" cy="260" r="8" fill="#3b82f6" />
    <circle cx="225" cy="200" r="10" fill="#3b82f6" />
  </g>
</svg>
